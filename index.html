<!DOCTYPE html>
<html>
<head>
    <title>Responsive Page</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            text-align: center;
            padding: 20px;
        }

        .boxes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .box {
            width: 40%;
            height: 150px;
            background-color: yellow;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .box {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>My Website</h1>

    <div class="boxes">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
    </div>

    <img src="https://via.placeholder.com/500">

    <p>This is a properly aligned responsive page.</p>
</div>

</body>
</html>
